<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/peerjs@1.3.2/dist/peerjs.min.js"></script>
    <!--TODO: host this yourself!https://peerjs.com/docs/-->
    <!-- <script src="script.js" defer></script> -->
  </head>
  <body>
    <audio id="localAudio" controls></audio>
    <label>localAudio</label>
    <button id="hangup-btn" hidden>Hang Up</button>
    <button id="call-btn">Call</button>
    <audio id="remoteAudio" controls></audio>
    <label>remoteAudio</label>
    <label id="my_peer_id_label"></label>

    <script>
      let peerConfiguration = {};

      (async () => {
        const response = await fetch(
          "https://matherium.metered.live/api/v1/turn/credentials?apiKey=138fc64d454a71ed6ba214fdca0ce0fcf5b0"
        );
        const iceServers = await response.json();
        peerConfiguration.iceServers = iceServers;
      })();
      my_peer_id = Math.floor(Math.random() * 2 ** 18)
        .toString(36)
        .padStart(4, 0);
      const peer = new Peer(`${my_peer_id}`, {
        host: location.hostname,
        debug: 3,
        path: "/peer-server", // The path where your self-hosted PeerServer is running.
        config: peerConfiguration,
        // secure: true //use SSL
      });
      window.peer = peer;

      const player = document.getElementById("localAudio");

      // const handleSuccess = async function (stream) {
      //   if (window.URL) {
      //     player.srcObject = await stream;
      //   } else {
      //     player.src = stream; // await stream?
      //     player.src = window.URL.createObjectURL(await stream); // assign URL object to src
      //   }
      // };
      const attachLocalStream = async (stream) => {
        window.localStream = await stream;
        // DON'T PLAY LOCAL STREAM NOW
        // window.localAudio.srcObject = await stream;
        // window.localAudio.autoplay = true;
      };
      const openMediaDevices = async (constraints) => {
        return await navigator.mediaDevices.getUserMedia(constraints);
      };

      try {
        const stream = openMediaDevices({ video: false, audio: true });
        // handleSuccess(stream);
        // bufferStream(stream);
        attachLocalStream(stream);
      } catch (error) {
        console.error("Error accessing media devices.", error);
      }

      console.log("my peer id is:", my_peer_id);
      const callBtn = document.querySelector("#call-btn");
      const hangupBtn = document.querySelector("#hangup-btn");
      // Displays the call button and peer ID
      function showCallContent() {
        window.my_peer_id_label.textContent = `Your device ID is: ${peer.id}`;
        callBtn.hidden = false;
        hangupBtn.hidden = true;
      }

      // Displays the audio controls and correct copy
      function showConnectedContent() {
        window.my_peer_id_label.textContent = "You're connected";
        callBtn.hidden = true;
        hangupBtn.hidden = false;
      }

      let code;
      function getStreamCode() {
        code = window.prompt(
          "Please enter the code for the peer you want to connect with"
        );
      }

      let conn;

      callBtn.addEventListener("click", () => {
        getStreamCode();
        // Calling logic
        conn = peer.connect(code); // STEP 1: CONNECT (signalling) //TODO: Be sure to listen on error event: peer.on('error', (error)=>{})
        //TODO: fetch endpoint /create-wrtc-peer
        const call = peer.call(code, window.localStream); // STEP 2: CALL with our local stream (we set window.locastream to our mediatsream)
        // TODO: Be sure to listen on error event: peer.on('error', (error)=>{})
        console.log("stag log: hello");
        call.on("stream", (remote_stream) => {
          // STEP 3: RECEIVE remote stream
          console.log("stag log: were in stream mode");
          window.remoteAudio.srcObject = remote_stream;
          window.remoteAudio.autoplay = true;
          window.peerStream = remote_stream; // this just sets a variable to access the remotestream later
          showConnectedContent();
        });
        conn.on("close", () => {
          // This is to execute code when the remote peer ends the call
          //Emitted when either you or the remote peer closes the data connection.
          showCallContent();
        });
      });

      // Hanging up logic

      hangupBtn.addEventListener("click", () => {
        console.log("stag log: hanging up");
        conn.close();
        peer.destroy();
        showCallContent();
      });

      // When the peer has connected to the server, diplay the peer ID

      peer.on("open", () => {
        window.my_peer_id_label.textContent = `Your code is: ${peer.id}`; // TODO: REMOVE THIS, STORE ID WHEN GENERATED
      });

      // When a data connection between peers is open, get the connecting peer's details

      peer.on("connection", (connection) => {
        conn = connection;
      });

      // Answering logic: When a call has been created, answer it and set the remote stream for the person being called

      peer.on("call", (call) => {
        // call event emitted when a remote peer attempts to call you
        const answerCall = confirm("Do you want to answer?");
        if (answerCall) {
          call.answer(window.localStream); //STEP 1: answer with your own local stream
          showConnectedContent();
          // Emitted when a remote peer adds a stream.
          // STEP 2: RECEIVE remote stream
          call.on("stream", (remote_stream) => {
            window.remoteAudio.srcObject = remote_stream;
            window.remoteAudio.autoplay = true;
            window.peerStream = remote_stream;
          });
          conn.on("close", () => {
            console.log('stag log: hanging up');
            // This is to execute code when the remote peer ends the call
            //Emitted when either you or the remote peer closes the data connection.
            peer.destroy();
            showCallContent();
          });
        } else {
          console.log("call denied");
        }
      });

      /**
       * Log errors to the console when they occur
       */
      peer.on("error", (err) => console.error(err));

      // navigator.mediaDevices
      //   .getUserMedia({ audio: true, video: false })
      //   .then(handleSuccess)
      //   .catch((error) => {
      //     console.error("Error accessing media devices.", error);
      //   });
    </script>
  </body>
</html>
